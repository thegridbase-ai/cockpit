<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="robots" content="noindex">
<title>Cockpit · Live Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --bg:#0a0c0f; --panel:rgba(16,20,26,0.82); --line:rgba(255,255,255,0.08);
    --fg:#eef2f6; --muted:#8b97a6; --accent:#00f0ff; --stale:#f0a000;
    --font:'-apple-system',BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);overflow:hidden}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg);font-family:var(--font)}
  .leaflet-control-attribution{background:rgba(10,12,15,0.6)!important;color:#5a6472!important;font-size:9px}
  .leaflet-control-attribution a{color:#7a8797!important}
  .leaflet-bar{border:1px solid var(--line)!important;box-shadow:none!important}
  .leaflet-bar a{background:var(--panel)!important;color:var(--fg)!important;border-bottom-color:var(--line)!important;
    backdrop-filter:blur(12px);width:38px;height:38px;line-height:38px;font-size:20px}
  .leaflet-bar a:hover{background:rgba(28,34,42,0.9)!important}
  .leaflet-control-zoom{margin:calc(env(safe-area-inset-top) + 66px) 16px 0 0!important}

  /* Car marker: glowing dot with a heading arrow */
  .car-dot{position:relative;width:26px;height:26px}
  .car-dot .pulse{position:absolute;inset:-14px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,240,255,0.28),transparent 70%);animation:pulse 2.4s ease-out infinite}
  .car-dot .core{position:absolute;inset:5px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px rgba(10,12,15,0.9),0 0 14px rgba(0,240,255,0.9)}
  .car-dot .arrow{position:absolute;top:-9px;left:50%;width:0;height:0;
    border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid var(--accent);
    transform-origin:50% 20px;transition:transform .5s ease-out;filter:drop-shadow(0 0 4px rgba(0,240,255,0.8))}
  .car-dot.no-heading .arrow{display:none}
  @keyframes pulse{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.5);opacity:0}}

  /* Top bar */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:600;display:flex;align-items:center;
    justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    background:linear-gradient(to bottom,rgba(10,12,15,0.85),transparent);pointer-events:none}
  #topbar > *{pointer-events:auto}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--fg);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
    font-size:14px;font-weight:600;backdrop-filter:blur(12px)}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

  /* Bottom HUD */
  #hud{position:absolute;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:600;
    display:flex;align-items:center;gap:12px}
  .readout{flex:1;display:flex;gap:22px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:12px 18px;backdrop-filter:blur(12px)}
  .stat .v{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1}
  .stat .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .btns{display:flex;gap:10px}
  .fab{width:54px;height:54px;border-radius:16px;background:var(--panel);border:1px solid var(--line);
    color:var(--fg);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);cursor:pointer}
  .fab svg{width:24px;height:24px}
  .fab.on{background:var(--accent);border-color:var(--accent);color:#001417}
  .fab:active{transform:scale(.94)}

  /* Waiting / lost overlay */
  #overlay{position:absolute;inset:0;z-index:700;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:28px;text-align:center;
    background:radial-gradient(circle at 50% 40%,rgba(0,240,255,0.06),transparent 60%),rgba(8,10,13,0.92)}
  #overlay.hidden{display:none}
  .radar{width:74px;height:74px;border-radius:50%;border:2px solid rgba(0,240,255,0.25);position:relative}
  .radar::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;
    border-top-color:var(--accent);animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #overlay h1{font-size:19px;font-weight:700}
  #overlay p{font-size:14px;color:var(--muted);max-width:340px;line-height:1.5}
  #overlay .hint{font-size:12px;color:#5a6472;margin-top:2px}
  .badge{position:absolute;top:calc(env(safe-area-inset-top) + 66px);left:50%;transform:translateX(-50%);
    z-index:600;background:rgba(240,160,0,0.14);border:1px solid rgba(240,160,0,0.4);color:var(--stale);
    padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;display:none;backdrop-filter:blur(10px)}
  .badge.show{display:block}
</style>
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <a class="back" href="/">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Cockpit
    </a>
    <span class="brand">Live Map</span>
  </div>

  <div class="badge" id="staleBadge">Signal from phone lost</div>

  <div id="hud" style="display:none">
    <div class="readout">
      <div class="stat"><div class="v" id="spd">—</div><div class="l">km/h</div></div>
      <div class="stat"><div class="v" id="age">—</div><div class="l">updated</div></div>
      <div class="stat"><div class="v" id="acc">—</div><div class="l">± m</div></div>
    </div>
    <div class="btns">
      <button class="fab on" id="followBtn" title="Follow me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
    </div>
  </div>

  <div id="overlay">
    <div class="radar"></div>
    <h1>Waiting for your phone's GPS…</h1>
    <p>Keep the <b>Cockpit</b> page open on your phone and your phone unlocked. Your live location will appear here and follow you as you drive.</p>
    <p class="hint" id="ovHint">Tip: on your phone, tap <b>Maps</b> again if nothing shows in ~15 seconds.</p>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

const FB_CONFIG = {
  apiKey: 'AIzaSyBkvpRhWESyVaTzyUyL4A72vvSClrzMfiY',
  authDomain: 'portfolio-cankilic-4931501.firebaseapp.com',
  projectId: 'portfolio-cankilic-4931501',
  databaseURL: 'https://portfolio-cankilic-4931501-default-rtdb.firebaseio.com',
  appId: '1:284553444374:web:fd8357bbc8911f1b944937'
};

const id = (location.hash || '').replace(/^#/, '');
const valid = /^[A-Za-z0-9_-]{16,48}$/.test(id);

const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');
const staleBadge = document.getElementById('staleBadge');

// ── Map ────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl:false, attributionControl:true, preferCanvas:true })
  .setView([20, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);
L.control.zoom({ position:'topright' }).addTo(map);

const carIcon = L.divIcon({
  className:'', iconSize:[26,26], iconAnchor:[13,13],
  html:'<div class="car-dot no-heading"><div class="pulse"></div><div class="arrow"></div><div class="core"></div></div>'
});
let marker = null, accCircle = null, follow = true, firstFix = true, lastTs = 0;

const followBtn = document.getElementById('followBtn');
followBtn.addEventListener('click', () => {
  follow = !follow;
  followBtn.classList.toggle('on', follow);
  if (follow && marker) map.panTo(marker.getLatLng(), { animate:true });
});
// Dragging the map turns off auto-follow (so the user can look around)
map.on('dragstart', () => { follow = false; followBtn.classList.remove('on'); });

function update(d){
  const lat = d.lat, lng = d.lng, acc = d.acc ?? null;
  const pos = [lat, lng];
  lastTs = d.ts || Date.now();

  if (!marker){
    marker = L.marker(pos, { icon:carIcon, interactive:false, keyboard:false }).addTo(map);
    accCircle = L.circle(pos, { radius:acc||30, color:'#00f0ff', weight:1,
      fillColor:'#00f0ff', fillOpacity:0.06, opacity:0.35, interactive:false }).addTo(map);
  } else {
    marker.setLatLng(pos);
    accCircle.setLatLng(pos);
    if (acc) accCircle.setRadius(acc);
  }

  // Heading arrow (only when we have a real bearing and are moving)
  const el = marker.getElement()?.querySelector('.car-dot');
  const arrow = el?.querySelector('.arrow');
  if (el && arrow){
    if (d.hdg != null && d.spd != null && d.spd > 0.7){
      el.classList.remove('no-heading');
      arrow.style.transform = `rotate(${d.hdg}deg)`;
    } else {
      el.classList.add('no-heading');
    }
  }

  if (firstFix){
    firstFix = false;
    overlay.classList.add('hidden');
    hud.style.display = 'flex';
    map.setView(pos, 16, { animate:true });
  } else if (follow){
    map.panTo(pos, { animate:true, duration:0.6 });
  }

  document.getElementById('spd').textContent = d.spd != null ? Math.round(d.spd * 3.6) : '0';
  document.getElementById('acc').textContent = acc != null ? Math.round(acc) : '—';
  staleBadge.classList.remove('show');
}

if (!valid){
  overlay.querySelector('h1').textContent = 'This link is incomplete';
  overlay.querySelector('p').textContent = 'Re-open Pair Phone on the car screen and send Maps from your phone again.';
  overlay.querySelector('.radar').style.display = 'none';
} else {
  const app = initializeApp(FB_CONFIG);
  const db = getDatabase(app);
  onValue(ref(db, 'cockpit-geo/' + id), (snap) => {
    const d = snap.val();
    if (d && typeof d.lat === 'number' && typeof d.lng === 'number') update(d);
  });
}

// ── Freshness HUD + stale detection ──────────────────────────────────────────
setInterval(() => {
  if (firstFix) return;
  const ageSec = Math.round((Date.now() - lastTs) / 1000);
  document.getElementById('age').textContent = ageSec < 60 ? ageSec + 's' : Math.round(ageSec/60) + 'm';
  staleBadge.classList.toggle('show', ageSec > 15);
}, 1000);

// Keep tiles correct if the Tesla browser resizes/rotates
window.addEventListener('resize', () => map.invalidateSize());
</script>
</body>
</html>
